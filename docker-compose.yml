version: '3.9'
services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
      - VITE_WS_URL=ws://localhost:3001
    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file: .env
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
      - ./backend/db:/app/db
      - /app/node_modules
    depends_on:
      - ml-service

  ml-service:
    build: ./ml-service
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - UPLOAD_DIR=/app/uploads
      - MODEL_CACHE_DIR=/app/model_cache
    volumes:
      - ./backend/uploads:/app/uploads
      - ./ml-service:/app
