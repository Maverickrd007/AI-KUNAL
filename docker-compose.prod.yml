services:
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=3001
      - ML_SERVICE_URL=http://ml-service:8000
      - SQLITE_PATH=/app/db/astraml.db
      - UPLOAD_DIR=/app/uploads
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-}
    volumes:
      - backend_uploads:/app/uploads
      - backend_db:/app/db
    depends_on:
      - ml-service

  ml-service:
    build:
      context: ./ml-service
    restart: unless-stopped
    env_file: .env
    environment:
      - UPLOAD_DIR=/app/uploads
      - MODEL_CACHE_DIR=/app/model_cache
    volumes:
      - backend_uploads:/app/uploads
      - ml_model_cache:/app/model_cache

volumes:
  backend_uploads:
  backend_db:
  ml_model_cache:
